<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Verbum AI — Request Vault v2026-03-09-01</title>
  <link rel="stylesheet" href="/assets/style.css" />
  <style>
    :root{
      --blue:#3B82F6;
      --blueDark:#1E3A8A;
      --orange:#FF7A00;
      --bg:#f7f9fc;
      --text:#111827;
      --muted:#6b7280;
      --card:#ffffff;
      --border:rgba(17,24,39,0.12);
      --shadow:0 10px 30px rgba(17,24,39,0.08);
      --radius:18px;
    }

    <script>
      console.log("VAULT_VERSION = 2026-03-09-01");
    </script>

    *{ box-sizing:border-box; }

    body{
      font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
      background:
        radial-gradient(1100px 500px at 50% -200px, rgba(59,130,246,0.18), transparent 60%),
        radial-gradient(900px 450px at 90% 0px, rgba(255,122,0,0.12), transparent 55%),
        var(--bg);
      color:var(--text);
      margin:0;
      padding:24px;
    }

    .wrap{
      max-width:1400px;
      margin:0 auto;
    }

    .card{
      background:#fff;
      border:1px solid var(--border);
      border-radius:18px;
      padding:18px;
      box-shadow:var(--shadow);
    }

    h1{
      margin:0 0 8px;
      font-size:2rem;
      letter-spacing:-0.02em;
    }

    .sub{
      margin:0 0 16px;
      color:#4b5563;
      line-height:1.6;
    }

    .toolbar{
      display:grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      gap:10px;
      margin-bottom:14px;
    }

    .toolbar input,
    .toolbar select,
    .toolbar button{
      padding:10px 12px;
      border-radius:12px;
      border:1px solid rgba(17,24,39,.14);
      font-size:14px;
      min-height:42px;
    }

    .toolbar button{
      cursor:pointer;
      background:var(--blueDark);
      color:#fff;
      border:none;
      font-weight:800;
    }

    .toolbar button.secondary{
      background:#fff;
      color:#111827;
      border:1px solid rgba(17,24,39,.16);
    }

    .status-line{
      margin:8px 0 14px;
      color:var(--muted);
      font-size:0.95rem;
      line-height:1.5;
      min-height:24px;
    }

    .table-wrap{
      overflow:auto;
      border:1px solid rgba(17,24,39,.08);
      border-radius:16px;
      background:#fff;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:1150px;
    }

    th, td{
      padding:10px 10px;
      border-bottom:1px solid rgba(17,24,39,.08);
      text-align:left;
      vertical-align:top;
      font-size:14px;
    }

    th{
      background:#f9fafb;
      position:sticky;
      top:0;
      z-index:1;
    }

    tr:hover td{
      background:rgba(59,130,246,.03);
    }

    .muted{ color:#6b7280; }

    .msg{
      max-width:320px;
      white-space:pre-wrap;
      line-height:1.5;
    }

    .email-cell{
      word-break:break-word;
    }

    .actions{
      white-space:nowrap;
    }

    .actions a{
      display:inline-block;
      margin-right:10px;
      margin-bottom:6px;
      color:var(--blueDark);
      text-decoration:none;
      font-weight:800;
    }

    .actions a:hover{
      text-decoration:underline;
    }
    .table-wrap{
      overflow:auto;
      -webkit-overflow-scrolling: touch;
      border:1px solid rgba(17,24,39,.08);
      border-radius:16px;
      background:#fff;
    }

    @media (max-width:640px){
  body{ padding:14px; }

  .toolbar{
    grid-template-columns:1fr;
  }

  th, td{
    font-size:13px;
    padding:9px 8px;
  }

  .msg{
    max-width:220px;
  }
}
    .badge{
      display:inline-block;
      padding:5px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      border:1px solid rgba(17,24,39,.12);
      background:#fff;
      color:#374151;
    }

    .badge.new{
      background:rgba(59,130,246,.10);
      color:#1E3A8A;
      border-color:rgba(59,130,246,.20);
    }

    .badge.reviewed{
      background:rgba(255,122,0,.10);
      color:#8a3c00;
      border-color:rgba(255,122,0,.24);
    }

    .badge.contacted,
    .badge.approved,
    .badge.converted{
      background:rgba(16,185,129,.10);
      color:#065f46;
      border-color:rgba(16,185,129,.22);
    }

    .empty{
      padding:24px;
      text-align:center;
      color:#6b7280;
    }

    @media (max-width:1100px){
      .toolbar{
        grid-template-columns: repeat(2, minmax(140px, 1fr));
      }
    }

    @media (max-width:640px){
      body{ padding:14px; }
      .toolbar{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Request Vault</h1>
      <p class="sub">
        Private Verbum AI request review page. Filter, search, export, and reply directly from here.
      </p>

      <div class="toolbar">
        <input id="search-box" type="text" placeholder="Search name, email, org, message..." />

        <select id="filter-interest">
          <option value="">All tiers</option>
          <option value="basic">Basic</option>
          <option value="pro">Pro</option>
          <option value="academic">Academic</option>
          <option value="advanced">Advanced</option>
        </select>

        <select id="filter-status">
          <option value="">All statuses</option>
          <option value="new">New</option>
          <option value="reviewed">Reviewed</option>
          <option value="contacted">Contacted</option>
          <option value="approved">Approved</option>
          <option value="converted">Converted</option>
          <option value="closed">Closed</option>
        </select>

        <select id="filter-platform">
          <option value="">All platforms</option>
          <option value="windows">Windows</option>
          <option value="macos">macOS</option>
        </select>

        <button id="refresh-btn" type="button">Refresh</button>
        <button id="export-btn" class="secondary" type="button">Export CSV</button>
      </div>

      <div id="status" class="status-line">Loading requests...</div>

      <div class="table-wrap">
        <table id="requests-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Name</th>
              <th>Email</th>
              <th>Organization</th>
              <th>Tier</th>
              <th>Platform</th>
              <th>Status</th>
              <th>Source</th>
              <th>Message</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>

        <div id="empty-state" class="empty" style="display:none;">
          No requests match the current filters.
        </div>
      </div>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById("status");
    const tbody = document.querySelector("#requests-table tbody");
    const emptyState = document.getElementById("empty-state");

    const searchBox = document.getElementById("search-box");
    const filterInterest = document.getElementById("filter-interest");
    const filterStatus = document.getElementById("filter-status");
    const filterPlatform = document.getElementById("filter-platform");
    const refreshBtn = document.getElementById("refresh-btn");
    const exportBtn = document.getElementById("export-btn");

    let allRows = [];
    let currentRows = [];

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatDate(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return iso;
      return d.toLocaleString();
    }

    function badgeClass(status) {
      const s = String(status || "").toLowerCase();
      return s ? `badge ${s}` : "badge";
    }

    function buildMailto(row) {
      const subject = encodeURIComponent(`Verbum AI ${row.interest} request`);
      const body = encodeURIComponent(
`Hi ${row.name},

Thank you for your interest in Verbum AI.

Best regards,
Masod Samadi
Founder, Verbum AI`
      );
      return `mailto:${encodeURIComponent(row.email)}?subject=${subject}&body=${body}`;
    }

    function buildGmailCompose(row) {
      const subject = encodeURIComponent(`Verbum AI ${row.interest} request`);
      const body = encodeURIComponent(
`Hi ${row.name},

Thank you for your interest in Verbum AI.

Best regards,
Masod Samadi
Founder, Verbum AI`
      );
      return `https://mail.google.com/mail/?view=cm&fs=1&to=${encodeURIComponent(row.email)}&su=${subject}&body=${body}`;
    }

    function applyLocalFilters() {
      const q = searchBox.value.trim().toLowerCase();
      const interest = filterInterest.value.trim().toLowerCase();
      const status = filterStatus.value.trim().toLowerCase();
      const platform = filterPlatform.value.trim().toLowerCase();

      currentRows = allRows.filter(row => {
        const rowInterest = String(row.interest || "").toLowerCase();
        const rowStatus = String(row.status || "").toLowerCase();
        const rowPlatform = String(row.platform || "").toLowerCase();

        if (interest && rowInterest !== interest) return false;
        if (status && rowStatus !== status) return false;
        if (platform && rowPlatform !== platform) return false;

        if (q) {
          const haystack = [
            row.name,
            row.email,
            row.organization,
            row.message,
            row.request_source,
            row.interest,
            row.platform,
            row.status
          ].join(" ").toLowerCase();

          if (!haystack.includes(q)) return false;
        }

        return true;
      });

      renderRows(currentRows);
    }

    function renderRows(rows) {
      tbody.innerHTML = "";
      emptyState.style.display = rows.length ? "none" : "block";

      for (const row of rows) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${escapeHtml(formatDate(row.submitted_at))}</td>
          <td>${escapeHtml(row.name)}</td>
          <td class="email-cell">${escapeHtml(row.email)}</td>
          <td>${escapeHtml(row.organization || "")}</td>
          <td>${escapeHtml(row.interest)}</td>
          <td>${escapeHtml(row.platform)}</td>
          <td><span class="${badgeClass(row.status)}">${escapeHtml(row.status || "")}</span></td>
          <td>${escapeHtml(row.request_source || "")}</td>
          <td class="msg">${escapeHtml(row.message || "")}</td>
          <td class="actions">
            <a href="${buildMailto(row)}">Reply</a>
            <a href="${buildGmailCompose(row)}" target="_blank" rel="noopener noreferrer">Gmail</a>
          </td>
        `;
        console.log("Rendering row:", row);
        tbody.appendChild(tr);
      }

      statusEl.textContent = `${rows.length} request(s) shown.`;
    }

async function loadRequests() {
  statusEl.textContent = "Loading requests...";
  tbody.innerHTML = "";
  emptyState.style.display = "none";

  let data;

  try {
    const apiUrl = `${window.location.origin}/admin-api/requests?limit=300&_t=${Date.now()}`;
    const res = await fetch(apiUrl, {
      method: "GET",
      credentials: "include",
      cache: "no-store",
      headers: { "Accept": "application/json" }
    });

    const contentType = res.headers.get("content-type") || "";
    const rawText = await res.text();

    if (!contentType.includes("application/json")) {
      const preview = rawText.slice(0, 200).toLowerCase();

      if (
        preview.includes("cloudflare") ||
        preview.includes("access") ||
        preview.includes("<!doctype html") ||
        preview.includes("<html")
      ) {
        statusEl.textContent = "Cloudflare Access/session issue on this device.";
      } else {
        statusEl.textContent = `Unexpected server response (${res.status}).`;
      }

      console.error("Non-JSON response", {
        status: res.status,
        contentType,
        preview: rawText.slice(0, 400)
      });
      return;
    }

    data = JSON.parse(rawText);
    statusEl.textContent = `Loaded ${data.requests?.length || 0} rows from API.`;

    if (!res.ok || !data.success) {
      statusEl.textContent = data.error || `Failed to load requests (${res.status}).`;
      return;
    }
  } catch (err) {
    console.error("FETCH/PARSE ERROR:", err);
    statusEl.textContent = `Fetch failed: ${err && err.message ? err.message : err}`;
    return;
  }

  try {
    allRows = data.requests || [];
    statusEl.textContent = `Rendering ${allRows.length} rows...`;
    applyLocalFilters();
  } catch (err) {
    console.error("RENDER ERROR:", err);
    statusEl.textContent = `Render failed: ${err && err.message ? err.message : err}`;
  }
}

    function exportCsv() {
      const headers = [
        "submitted_at",
        "name",
        "email",
        "organization",
        "interest",
        "platform",
        "status",
        "request_source",
        "message"
      ];

      const lines = [
        headers.join(","),
        ...currentRows.map(row =>
          headers.map(h => `"${String(row[h] || "").replace(/"/g, '""')}"`).join(",")
        )
      ];

      const blob = new Blob([lines.join("\n")], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "verbum-ai-requests.csv";
      a.click();
      URL.revokeObjectURL(url);
    }

    searchBox.addEventListener("input", applyLocalFilters);
    filterInterest.addEventListener("change", applyLocalFilters);
    filterStatus.addEventListener("change", applyLocalFilters);
    filterPlatform.addEventListener("change", applyLocalFilters);
    refreshBtn.addEventListener("click", loadRequests);
    exportBtn.addEventListener("click", exportCsv);

    loadRequests();
  </script>
</body>
</html>
